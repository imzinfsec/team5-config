apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: petcarelog-dev
  namespace: argocd
spec:
  description: PetCareLog Dev Environment Project

  sourceRepos:
    - https://github.com/CLD-05/team5-config.git

  destinations:
    - server: DEV_CLUSTER_SERVER_URL
      namespace: petcarelog-dev

  clusterResourceWhitelist:
    - group: ""
      kind: Namespace

  namespaceResourceWhitelist:
    - group: "*"
      kind: "*"