## team5-config/argocd/projects/petcarelog-prod-project.yaml
apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: petcarelog-prod
  namespace: argocd
spec:
  description: PetCareLog Prod Environment Project

  sourceRepos:
    - https://github.com/imzinfsec/team5-config.git

  destinations:
    # 💡 운영계(prod)도 AWS EKS 주소를 걷어내고 가상머신 내부 방으로 정밀 조준!
    - server: "https://kubernetes.default.svc"
      namespace: petcarelog-prod

  clusterResourceWhitelist:
    - group: ""
      kind: Namespace

  namespaceResourceWhitelist:
    - group: "*"
      kind: "*"