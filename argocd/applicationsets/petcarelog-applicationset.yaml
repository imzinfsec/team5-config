apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: petcarelog-applicationset
  namespace: argocd 
spec:
  generators:
    - list:
        elements:
          - env: dev
            cluster: "https://4F76F579D9F28BA8D65131DCA870D2F4.gr7.ap-northeast-2.eks.amazonaws.com"
            namespace: petcarelog-dev

          - env: prod
            cluster: "https://2467051C6CE1E002CF1634B37DFC3D77.gr7.ap-northeast-2.eks.amazonaws.com" 
            namespace: petcarelog-prod

  template:
    metadata:
      name: 'petcarelog-{{env}}'
    spec:
      project: 'petcarelog-{{env}}'

      source:
        repoURL: 'https://github.com/CLD-05/team5-config.git'
        targetRevision: HEAD
        path: 'apps/petcarelog/overlays/{{env}}'

      destination:
        server: '{{cluster}}'
        namespace: '{{namespace}}'

      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true