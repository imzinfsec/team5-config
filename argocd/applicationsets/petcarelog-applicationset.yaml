## team5-config/argocd/applicationsets/petcarelog-applicationset.yaml
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: petcarelog-applicationset
  namespace: argocd 
spec:
  generators:
    - list:
        elements:
          # 🟢 개발계 배포 타겟
          - env: dev
            cluster: "https://kubernetes.default.svc"
            namespace: petcarelog-dev

          # 🔵 운영계 배포 타겟 (추가완료!)
          - env: prod
            cluster: "https://kubernetes.default.svc"
            namespace: petcarelog-prod

  template:
    metadata:
      name: 'petcarelog-{{env}}'
    spec:
      project: default

      source:
        repoURL: 'https://github.com/imzinfsec/team5-config.git'
        targetRevision: HEAD
        path: 'apps/petcarelog/overlays/{{env}}'

      destination:
        server: '{{cluster}}'
        namespace: '{{namespace}}'

      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true