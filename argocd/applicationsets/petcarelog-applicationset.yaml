## petcarelog-applicationset.yaml
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: petcarelog-applicationset
  namespace: argocd 
spec:
  generators:
    - list:
        elements:
          # 💡 dev 환경만 남기고 아래에 있던 prod 엘리먼트는 통째로 삭제했습니다.
          - env: dev
            cluster: "https://kubernetes.default.svc"
            namespace: petcarelog-dev

  template:
    metadata:
      name: 'petcarelog-{{env}}'
    spec:
      project: 'petcarelog-{{env}}'

      source:
        repoURL: 'https://github.com/imzinfsec/team5-config.git'
        targetRevision: HEAD
        path: 'apps/petcarelog/overlays/{{env}}'

      destination:
        server: '{{cluster}}'
        namespace: '{{namespace}}'

      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true