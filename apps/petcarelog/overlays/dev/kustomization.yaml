# team5-config/petcarelog/overlays/dev/kustomization.yaml
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: petcarelog-dev

resources:
  - ../../base
  - namespace.yaml
  - serviceaccount.yaml
  - config.yaml
  - mysql-deployment.yaml   # 새로 추가된 DB 부품
  - redis-deployment.yaml   # 새로 추가된 Redis 부품

patches:
  - path: patch-deployment.yaml
  - path: patch-ingress.yaml
  - path: patch-servicemonitor.yaml